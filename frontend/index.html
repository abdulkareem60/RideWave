<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RideWave — Safe, Reliable Rides</title>
  <meta name="description" content="RideWave is a ride-sharing platform connecting drivers and passengers safely." />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    // Anti-flicker: resolve and apply the theme class BEFORE first paint,
    // so there's no flash of light mode before React/ThemeProvider mounts.
    // This duplicates the resolution logic in ThemeContext.jsx on purpose —
    // it must run synchronously here, before any JS bundle loads.
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        var theme = (stored === 'light' || stored === 'dark')
          ? stored
          : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.classList.add(theme);
        document.documentElement.style.colorScheme = theme;
      } catch (e) {
        document.documentElement.classList.add('light');
      }
    })();
  </script>
</head>
<body class="font-sans" style="background-color: var(--rw-bg-body); color: var(--rw-text-body); transition: background-color 200ms ease, color 200ms ease;">
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
