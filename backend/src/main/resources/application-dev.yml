spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ridewave_dev
    username: ${DB_USER:postgres}
    password: '${DB_PASS:}'
    hikari:
      pool-name: RideWaveHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20

  flyway:
    enabled: false

logging:
  level:
    com.ridewave: DEBUG
    org.hibernate.SQL: WARN

app:
  verification:
    ai-score-threshold: ${AI_SCORE_THRESHOLD:0.80}