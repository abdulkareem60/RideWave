# ============================================================
# RideWave — Main Application Configuration
#
# All sensitive values are read from environment variables.
# Defaults (after the colon) are safe for local development only.
# On Render / Vercel, set the corresponding env vars in the
# dashboard — never commit real credentials here.
# ============================================================

spring:

  # ── Database ─────────────────────────────────────────────
  datasource:
    url:      ${DB_URL:jdbc:postgresql://localhost:5432/ridewave}
    username: ${DB_USER:ridewave_user}
    password: ${DB_PASS:secret}
    hikari:
      pool-name:            RideWaveHikariPool
      maximum-pool-size:    10
      minimum-idle:         2
      connection-timeout:   30000
      idle-timeout:         600000
      max-lifetime:         1800000

  # ── JPA / Hibernate ──────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update            # use 'validate' once schema is stable
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  # ── Spring Mail (JavaMailSender) ──────────────────────────
  #
  # Set these env vars on Render:
  #   MAIL_HOST          → smtp-relay.brevo.com   (or smtp.sendgrid.net)
  #   MAIL_PORT          → 587
  #   MAIL_USERNAME      → your SMTP login
  #   MAIL_PASSWORD      → your SMTP key / password
  #
  # The from-address and display name are controlled by the
  # app.mail.* properties below, NOT by spring.mail.username.
  mail:
    host:     ${MAIL_HOST:smtp-relay.brevo.com}
    port:     ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth:            true
          starttls:
            enable:        true
            required:      true
          connectiontimeout: 10000
          timeout:           10000
          writetimeout:      10000
        debug: false         # set to true temporarily to see SMTP handshake logs

  # ── Flyway ────────────────────────────────────────────────
  flyway:
    enabled:          true
    locations:        classpath:db/migration
    baseline-on-migrate: true

  # ── Servlet / File upload ─────────────────────────────────
  servlet:
    multipart:
      max-file-size:    20MB
      max-request-size: 25MB

  # ── Async (email / notifications run on a thread pool) ────
  task:
    execution:
      pool:
        core-size:      4
        max-size:       16
        queue-capacity: 100

# ── JWT ──────────────────────────────────────────────────────
jwt:
  secret:             ${JWT_SECRET:changeme_at_least_64_chars_long_for_HS512_algorithm_please}
  expiration:         86400000       # 24 h in ms
  refresh-expiration: 604800000      # 7 d in ms

# ── Application-level properties (AppProperties.java) ────────
#
# CORS
#   CORS_ORIGINS env var accepts a comma-separated list, e.g.:
#     https://ride-wave-murex.vercel.app,https://custom.domain.com
#
# Mail
#   MAIL_FROM_ADDRESS → the "From" address shown to recipients
#   MAIL_FROM_NAME    → the display name shown to recipients
#
# OTP
#   Expiry in minutes (default 10).
#
app:
  cors:
    allowed-origins: >-
      ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,https://ride-wave-murex.vercel.app}

  mail:
    from-address: ${MAIL_FROM_ADDRESS:noreply@ridewave.pk}
    from-name:    ${MAIL_FROM_NAME:RideWave}

  otp:
    expiry-minutes: ${OTP_EXPIRY_MINUTES:10}
    max-attempts:   ${OTP_MAX_ATTEMPTS:3}

  admin:
    email:     ${ADMIN_EMAIL:admin@ridewave.com}
    password:  ${ADMIN_PASSWORD:Admin@RideWave123}
    full-name: ${ADMIN_FULL_NAME:RideWave Admin}
    phone:     ${ADMIN_PHONE:+920000000000}

# ── Gemini AI (driver document OCR) ──────────────────────────
gemini:
  api-key: ${GEMINI_API_KEY:}
  model:   gemini-1.5-flash

# ── Actuator ─────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# ── Logging ──────────────────────────────────────────────────
logging:
  level:
    root:                        INFO
    com.ridewave:                DEBUG
    org.springframework.mail:    DEBUG   # Shows SMTP connection details
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"