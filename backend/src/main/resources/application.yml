# ============================================================
# RideWave – Main Application Configuration
# ============================================================

spring:
  application:
    name: ridewave-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ==========================================================
  # DATABASE
  # ==========================================================
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ridewave}?sslmode=require
    username: ${DB_USER:postgres}
    password: ${DB_PASS:password}
    driver-class-name: org.postgresql.Driver

    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      pool-name: RideWaveHikariPool

  # ==========================================================
  # JPA
  # ==========================================================
  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: false
    open-in-view: false

    properties:
      hibernate:
        format_sql: true
        default_schema: public

        jdbc:
          batch_size: 20

        order_inserts: true
        order_updates: true

  # ==========================================================
  # FLYWAY
  # ==========================================================
  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public

  # ==========================================================
  # JACKSON
  # ==========================================================
  jackson:
    serialization:
      write-dates-as-timestamps: false

    deserialization:
      fail-on-unknown-properties: false

    default-property-inclusion: non_null

# ============================================================
# BREVO API
# ============================================================

brevo:
  api-key: ${BREVO_API_KEY}

# ============================================================
# SERVER
# ============================================================

server:
  port: ${PORT:8080}

  servlet:
    context-path: /

  error:
    include-message: always
    include-binding-errors: always

# ============================================================
# JWT
# ============================================================

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

# ============================================================
# TWILIO
# ============================================================

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  from-number: ${TWILIO_FROM_NUMBER:}
  enabled: ${TWILIO_ENABLED:false}

# ============================================================
# GOOGLE MAPS
# ============================================================

google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY:}

# ============================================================
# PAYMENT
# ============================================================

payment:
  provider: ${PAYMENT_PROVIDER:null}
  currency: PKR

# ============================================================
# APP
# ============================================================

app:

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

  admin:
    email: ${ADMIN_EMAIL:admin@ridewave.com}
    password: ${ADMIN_PASSWORD:Admin@RideWave123}
    full-name: ${ADMIN_FULL_NAME:RideWave Admin}
    phone: ${ADMIN_PHONE:+92000000000}

  otp:
    expiry-minutes: 10
    ride-otp-expiry-minutes: 30

  trust-score:
    default-score: 3.0
    min-to-book: 1.5
    min-to-drive: 2.0
    auto-suspend-below: 1.0

  verification:
    tessdata-path: ${TESSDATA_PREFIX:}
    blur-threshold: ${BLUR_THRESHOLD:100.0}
    ai-score-threshold: ${AI_SCORE_THRESHOLD:0.60}

  mail:
    from-address: ${MAIL_FROM_ADDRESS}
    from-name: ${MAIL_FROM_NAME:RideWave}

# ============================================================
# GEMINI
# ============================================================

gemini:
  enabled: false

# ============================================================
# ACTUATOR
# ============================================================

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      show-details: when-authorized

# ============================================================
# SWAGGER
# ============================================================

springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

  info:
    title: RideWave API
    version: 1.0.0
    description: Ride-sharing platform REST API